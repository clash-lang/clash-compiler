    CACHE_BUST_TOKEN: 3
    # Note that the fallback key has two cache bust tokens. `$CACHE_BUST_TOKEN`
    # is our own, defined right above, and the `-3` at the end in the fallback
    # key below is GitLab's cache bust token that gets incremented when the user
    # clicks "Clear runner caches" in the GitLab web interface. We need to
    # specify both in the fallback key specifically, but *only* our own in the
    # `cache.key` keyword of a job.
    CACHE_FALLBACK_KEY: $CI_JOB_NAME-1-8-$CI_JOB_IMAGE-$CACHE_BUST_TOKEN-3
    GIT_SUBMODULE_STRATEGY: recursive
    TERM: xterm-color
  cache:
    key: $CI_JOB_NAME-$CI_COMMIT_REF_SLUG-$CI_JOB_IMAGE-3
    when: always
    paths:
      - cache.tar.zst
  before_script:
    - export THREADS=$(./.ci/effective_cpus.sh)
    - export CABAL_JOBS=$(./.ci/effective_cpus.sh)
    - export CABAL_DIR=$HOME/.cabal
    - export
    - tar -xf cache.tar.zst -C / || true
    - .ci/setup.sh
  after_script:
    - export THREADS=$(./.ci/effective_cpus.sh)
    - tar -cf - $(ls -d /root/.cabal /root/.stack || true) | zstd -T${THREADS} -3 > cache.tar.zst

# We run tests on local machines if:
#
#   * A job may take more than 3 minutes to complete on public runners.
#   * A job needs specific capabilities public runners cannot provide, e.g.
#     more than 4GB memory of memory, proprietary synthesis tooling.
#
.common-local:
  extends: .common
  timeout: 2 hours
  tags:
    - local
