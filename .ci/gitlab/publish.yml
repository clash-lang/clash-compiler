hackage-sdist:
  extends: .common-local
  needs: []
  stage: pack
  script:
    - .ci/build_sdist.sh clash-prelude
    - .ci/build_sdist.sh clash-prelude-hedgehog
    - .ci/build_sdist.sh clash-lib
    - .ci/build_sdist.sh clash-lib-hedgehog
    - .ci/build_sdist.sh clash-ghc
  artifacts:
    paths:
      - clash-*.tar.gz  # clash-{prelude,lib,ghc}-$version{-docs,}.tar.gz
    expire_in: 1 week

.hackage:
  extends: .common
  interruptible: false
  stage: publish
  cache:
    key: hackage-$CI_JOB_IMAGE
  script:
    # Currently, GitLab runners do not propagate the error code, but we need to
    # match on it for allowed-to-fail
    - .ci/publish_sdist.sh clash-prelude || exit $?
    - .ci/publish_sdist.sh clash-prelude-hedgehog || exit $?
    - .ci/publish_sdist.sh clash-lib || exit $?
    - .ci/publish_sdist.sh clash-lib-hedgehog || exit $?
    - .ci/publish_sdist.sh clash-ghc || exit $?
